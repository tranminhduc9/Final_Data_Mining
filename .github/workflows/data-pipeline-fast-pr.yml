name: Data Pipeline Fast Tests (PR)

on:
  pull_request:
    branches:
      - test
      - main

jobs:
  fast-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run fast data-pipeline tests
        run: |
          pytest tests/test_data_pipeline -m "fast" -q
