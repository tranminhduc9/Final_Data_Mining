name: Data Pipeline Scrape Tests (Scheduled/Manual)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"
  pull_request:
    branches:
      - main

jobs:
  scrape-tests:
    if: ${{ github.event_name != 'pull_request' || github.head_ref == 'test' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scrape-marked data-pipeline tests
        run: |
          pytest tests/test_data_pipeline -m "scrape" -q
