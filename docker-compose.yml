services:
  neo4j-local:
    image: neo4j:5
    container_name: neo4j-local
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/localpassword
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "2g"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: techpulse-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  rag-service:
    build: ./src/ai-rag-core
    container_name: techpulse-rag
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      USE_LOCAL_NEO4J: "false"   # Dùng AuraDB cloud khi chạy trong Docker
    restart: unless-stopped

  golang-api:
    build:
      context: ./src/backend/golang-api
      dockerfile: Dockerfile
    container_name: techpulse-golang-api
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      PYTHON_AI_BASE_URL: "http://rag-service:8000"   # docker network override
    depends_on:
      - rag-service
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  redis_data:
