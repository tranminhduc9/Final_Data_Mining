version: "3.9"

services:
  neo4j-local:
    image: neo4j:5
    container_name: neo4j-local
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt protocol (dùng trong code)
    environment:
      NEO4J_AUTH: neo4j/localpassword
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "2g"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: techpulse-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: techpulse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: techpulse-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  rag-service:
    build: ./src/ai-rag-core
    container_name: techpulse-rag
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      USE_LOCAL_NEO4J: "false"        # Dùng AuraDB khi chạy trong Docker
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data:
  redis_data:
