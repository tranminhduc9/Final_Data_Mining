# TechPulse VN - Docker Compose Configuration
# Airflow orchestrates all services, runs at 22:00 VN time daily

services:
  # ============ AIRFLOW ORCHESTRATOR ============
  airflow-webserver:
    image: apache/airflow:2.8.0-python3.10
    container_name: airflow-webserver
    ports:
      - "8080:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__FERNET_KEY=FT8Lt2VuuvLtcWG3jpzTTvcVXZsyJsn69Mo0FnZ2utI=
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__WEB_SERVER_HOST=0.0.0.0
      - AIRFLOW__WEBSERVER__WEB_SERVER_PORT=8080
      - AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL=30
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
    volumes:
      - ./orchestrator/dags:/opt/airflow/dags
      - airflow-data:/opt/airflow
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - kafka
    networks:
      - techpulse-network
    command: bash -c "airflow db init && airflow webserver"
    restart: unless-stopped

  airflow-scheduler:
    image: apache/airflow:2.8.0-python3.10
    container_name: airflow-scheduler
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__FERNET_KEY=FT8Lt2VuuvLtcWG3jpzTTvcVXZsyJsn69Mo0FnZ2utI=
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL=30
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
    volumes:
      - ./orchestrator/dags:/opt/airflow/dags
      - airflow-data:/opt/airflow
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - airflow-webserver
    networks:
      - techpulse-network
    command: airflow scheduler
    restart: unless-stopped

  # ============ INFRASTRUCTURE ============
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - techpulse-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9094:9094"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9094
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DELETE_TOPIC_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - techpulse-network

  # ============ CRAWLERS (Python) ============
  # Crawlers are now started/stopped by Airflow DAG
  # They remain running but Airflow controls when they actually crawl
  
  crawler-vnexpress:
    build:
      context: ./crawl
      dockerfile: Dockerfile
    container_name: crawler-vnexpress
    command: tail -f /dev/null  # Keep container running, Airflow will exec into it
    volumes:
      - ./data/raw/vnexpress:/app/data/raw/vnexpress
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - MAX_ARTICLES=150
      - CRAWL_TIMEOUT_HOURS=2
    depends_on:
      - kafka
    networks:
      - techpulse-network
    restart: unless-stopped

  crawler-genk:
    build:
      context: ./crawl
      dockerfile: Dockerfile
    container_name: crawler-genk
    command: tail -f /dev/null  # Keep container running, Airflow will exec into it
    volumes:
      - ./data/raw/genk:/app/data/raw/genk
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - MAX_ARTICLES=150
      - CRAWL_TIMEOUT_HOURS=2
    depends_on:
      - kafka
    networks:
      - techpulse-network
    restart: unless-stopped

  crawler-dantri:
    build:
      context: ./crawl
      dockerfile: Dockerfile
    container_name: crawler-dantri
    command: tail -f /dev/null  # Keep container running, Airflow will exec into it
    volumes:
      - ./data/raw/dantri:/app/data/raw/dantri
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - MAX_ARTICLES=150
      - CRAWL_TIMEOUT_HOURS=2
    depends_on:
      - kafka
    networks:
      - techpulse-network
    restart: unless-stopped

  # ============ PROCESSING SERVICES ============
  # Embedding Service (Python/SentenceTransformers)
  embedding-service:
    build:
      context: ./services/embedding_service
      dockerfile: Dockerfile
    container_name: embedding-service
    env_file:
      - .env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      - kafka
    networks:
      - techpulse-network
    restart: unless-stopped

  # Processing Orchestrator (Golang): Entity Extractor + Neo4j Writer + Qdrant Writer
  orchestrator:
    build:
      context: .
      dockerfile: build/Dockerfile.orchestrator
    container_name: orchestrator
    env_file:
      - .env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      - kafka
    networks:
      - techpulse-network
    # Started by Airflow DAG after crawling
    command: tail -f /dev/null
    restart: unless-stopped

networks:
  techpulse-network:
    driver: bridge

volumes:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:
  airflow-data: