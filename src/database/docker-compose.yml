# version: '3.8'

services:
  # ============ INFRASTRUCTURE ============
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - techpulse-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9094:9094"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9094
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DELETE_TOPIC_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - techpulse-network

  # ============ CRAWLERS (Python) - Skip TopCV (broken) ============
  crawler-vnexpress:
    build:
      context: ./crawl
      dockerfile: Dockerfile
    container_name: crawler-vnexpress
    command: python VNExpress.py
    volumes:
      - ./data/raw/vnexpress:/app/data/raw/vnexpress
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - MAX_ARTICLES=150
      - CRAWL_INTERVAL_MINUTES=60
    depends_on:
      - kafka
    networks:
      - techpulse-network
    restart: unless-stopped

  crawler-genk:
    build:
      context: ./crawl
      dockerfile: Dockerfile
    container_name: crawler-genk
    command: python GenK.py
    volumes:
      - ./data/raw/genk:/app/data/raw/genk
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - MAX_ARTICLES=150
      - CRAWL_INTERVAL_MINUTES=60
    depends_on:
      - kafka
    networks:
      - techpulse-network
    restart: unless-stopped

  crawler-dantri:
    build:
      context: ./crawl
      dockerfile: Dockerfile
    container_name: crawler-dantri
    command: python DanTri.py
    volumes:
      - ./data/raw/dantri:/app/data/raw/dantri
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - MAX_ARTICLES=150
      - CRAWL_INTERVAL_MINUTES=60
    depends_on:
      - kafka
    networks:
      - techpulse-network
    restart: unless-stopped

  # ============ PROCESSING SERVICES ============
  # Embedding Service (Python/SentenceTransformers)
  embedding-service:
    build:
      context: ./services/embedding_service
      dockerfile: Dockerfile
    container_name: embedding-service
    env_file:
      - .env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      - kafka
    networks:
      - techpulse-network
    restart: unless-stopped

  # Orchestrator (Golang): Entity Extractor + Neo4j Writer + Qdrant Writer
  orchestrator:
    build:
      context: .
      dockerfile: docker/Dockerfile.orchestrator
    container_name: orchestrator
    env_file:
      - .env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      - kafka
    networks:
      - techpulse-network
    restart: unless-stopped

networks:
  techpulse-network:
    driver: bridge

volumes:
  zookeeper-data:
  zookeeper-logs:
  kafka-data: